name: Frontend CI/CD Pipeline - EP3

# Se activa SOLO en push a la rama deploy
on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Configura las credenciales de AWS
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # El frontend necesita la URL del backend como argumento de build
      # En EC2 esta será la IP privada del backend según tu diagrama
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/innovatech-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
            docker compose down
            docker compose up -d
            docker image prune -f