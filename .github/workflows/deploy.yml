name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/innovatech-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
            docker-compose down
            docker-compose up -d
            docker image prune -f