server {
    listen 80;

    # Sirve los archivos estáticos desde la carpeta donde Nginx los espera
    root /usr/share/nginx/html;
    index index.html;

    # Esta regla es crítica para React Router.
    # Sin ella, si el usuario navega directamente a /productos,
    # Nginx buscaría un archivo llamado "productos" en disco y daría 404.
    # Con try_files, cualquier ruta que no exista como archivo
    # redirige al index.html y React Router maneja el resto.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachea los assets compilados por Vite (JS, CSS, imágenes)
    # Vite les genera nombres con hash único, así que es seguro cachearlos agresivamente
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}