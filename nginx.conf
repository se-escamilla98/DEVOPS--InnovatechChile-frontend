    # Proxy hacia el backend (ALB interno). El navegador solo habla con el
    # frontend (mismo origen) - Nginx reenvia internamente dentro de la VPC,
    # donde el ALB interno si es alcanzable. Esto elimina CORS por completo
    # y nunca expone el backend directo a internet.
    location /health {
        proxy_pass http://internal-innovatech-alb-backend-1722042669.us-east-1.elb.amazonaws.com:8080/health;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://internal-innovatech-alb-backend-1722042669.us-east-1.elb.amazonaws.com:8080/api/;
        proxy_set_header Host $host;
    }

    # Esta regla es crítica para React Router.
    # Sin ella, si el usuario navega directamente a /productos,
    # Nginx buscaría un archivo llamado "productos" en disco y daría 404.
    # Con try_files, cualquier ruta que no exista como archivo
    # redirige al index.html y React Router maneja el resto.
